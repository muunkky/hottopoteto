[pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -ra
    --strict-markers
    --strict-config
    --showlocals
    --tb=short
    --cov=core
    --cov=plugins
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (may require external resources)
    slow: Tests that take significant time to run
    asyncio: Asynchronous tests

# Ignore paths
norecursedirs = 
    .git
    .venv
    output
    log
    __pycache__
    *.egg-info
    .pytest_cache

# Async configuration
asyncio_mode = auto
