# Eldorian Word Schema
# JSON Schema defining the structure of an Eldorian conlang word entry.
# Used by storage.init to create working documents and by llm.enrich
# to progressively build structured output.

type: object
title: Eldorian Word Entry
description: A complete word entry in the Eldorian constructed language

properties:
  english_word:
    type: string
    description: The English word being translated to Eldorian
  
  connotation:
    type: string
    description: The intended connotation or nuance of the word
  
  origin_words:
    type: array
    description: Etymology - the source words from which this word derives
    items:
      type: object
      properties:
        word:
          type: string
          description: The origin word
        meaning:
          type: string
          description: The meaning of the origin word
        origin:
          type: string
          description: The language or culture of origin
      required:
        - word
        - meaning
  
  eldorian_word:
    type: string
    description: The generated Eldorian word
  
  pronunciation:
    type: string
    description: IPA or phonetic pronunciation guide
  
  morphology:
    type: object
    description: Morphological breakdown of the word
    properties:
      roots:
        type: array
        items:
          type: string
        description: Root morphemes in the word
      affixes:
        type: array
        items:
          type: object
          properties:
            affix:
              type: string
            type:
              type: string
              enum: [prefix, suffix, infix]
            meaning:
              type: string
      word_class:
        type: string
        description: Part of speech (noun, verb, adjective, etc.)
  
  usage_examples:
    type: array
    description: Example sentences using this word
    items:
      type: object
      properties:
        eldorian:
          type: string
          description: The sentence in Eldorian
        translation:
          type: string
          description: English translation
  
  cultural_notes:
    type: string
    description: Cultural context or usage notes

required:
  - english_word
  - eldorian_word
