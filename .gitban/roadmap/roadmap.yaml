schema_version: 1.0.0
document_version: 0.1.0
last_updated: '2025-12-18'
metadata:
  maintained_by: Your Team
  review_frequency: Monthly
  related_docs:
    - docs/README.md
  tools:
    roadmap_tracking: roadmap.yaml
    task_tracking: gitban cards
    Gitban_mcp: https://github.com/muunkky/gitban-mcp
  changelog_usage_notes: "The changelog tracks significant project milestones, feature
    releases, and \narchitectural changes. It is NOT for tracking individual gitban
    card updates.\n\nWhat to include:\n- Version releases and feature completions\n\
    - Milestone achievements (e.g., \"M1: Foundation & Quality complete\")\n- Major
    architectural decisions (e.g., \"Adopted pytest for testing\")\n- Breaking changes
    or significant refactors\n- Sprint completions with high-level summaries\n\nWhat
    NOT to include:\n- Individual card creation, updates, or completions\n- Day-to-day
    task progress\n- Minor bug fixes (unless critical/production)\n- Card status changes
    or reassignments\n\nPrinciple: Changelog is strategic (roadmap-level), not tactical
    (card-level).\nCards are semi-ephemeral and tracked separately via gitban tools.\n"
changelog:
